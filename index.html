<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belad Al Cham — Menu | بلد الشام — قائمة الطعام</title>
  <meta name="description" content="Menu digital Belad Al Cham — Café & Restaurant, Avenue Mohamed V, Tétouan. Menu en français, arabe et espagnol.">
  <meta name="theme-color" content="#1A1512">

  <meta property="og:title" content="Belad Al Cham — Menu Digital">
  <meta property="og:description" content="Café & Restaurant — Avenue Mohamed V, Tétouan. Menu trilingue FR/AR/ES.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/images/Logo.png">

  <link rel="icon" href="assets/images/Logo.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Hidden SVG sprite for category icons -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="icon-croissant" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C9 2 6 4 6 8c0 2 1 3 2 4l-1 6h10l-1-6c1-1 2-2 2-4 0-4-3-6-6-6z"/>
      <path d="M9 22h6"/>
    </symbol>
    <symbol id="icon-assiette" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <path d="M8 12h8"/><path d="M12 8v8"/>
    </symbol>
    <symbol id="icon-crepe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 18c0-2 2-4 4-4h8c2 0 4 2 4 4"/>
      <path d="M4 14c0-4 3.5-8 8-8s8 4 8 8"/>
      <path d="M8 10V6"/><path d="M12 10V4"/><path d="M16 10V6"/>
    </symbol>
    <symbol id="icon-gaufre" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="8" width="18" height="12" rx="2"/>
      <path d="M3 12h18"/>
      <path d="M7 8V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/>
    </symbol>
    <symbol id="icon-flamme" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2c-1 3-4 5-4 9a4 4 0 0 0 8 0c0-4-3-6-4-9z"/>
      <path d="M10 16a2 2 0 0 0 4 0"/>
    </symbol>
    <symbol id="icon-verre" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 2h8l2 18H6L8 2z"/>
      <path d="M6 20h12"/>
    </symbol>
    <symbol id="icon-feuille" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 8c.7-1 1-2.2 1-3.5C18 3 15.5 1 12 1S6 3 6 4.5C6 5.8 6.3 7 7 8"/>
      <path d="M4 14c0 4 3.6 8 8 8s8-4 8-8"/>
      <path d="M12 8v14"/><path d="M8 12h8"/>
    </symbol>
    <symbol id="icon-dessert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v4"/><path d="M12 18v4"/>
      <path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/>
      <path d="M2 12h4"/><path d="M18 12h4"/>
      <path d="m4.93 19.07 2.83-2.83"/><path d="m16.24 7.76 2.83-2.83"/>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <path d="M21 21l-4.35-4.35"/>
    </symbol>
    <symbol id="icon-chevron-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 15l-6-6-6 6"/>
    </symbol>
  </svg>

  <!-- ====== HEADER ====== -->
  <header class="header" role="banner">
    <img src="assets/images/Logo.png" alt="Belad Al Cham logo" class="header-logo" width="72" height="72">
    <div class="header-name-ar">بلد الشام</div>
    <div class="header-name-en">Belad Al Cham</div>
    <div class="header-tagline">Café &amp; Restaurant</div>
  </header>

  <!-- ====== LANGUAGE SELECTOR ====== -->
  <nav class="lang-selector" aria-label="Choix de langue">
    <button data-lang="fr" aria-pressed="true">FR</button>
    <button data-lang="ar" aria-pressed="false">AR</button>
    <button data-lang="es" aria-pressed="false">ES</button>
  </nav>

  <!-- ====== SEARCH ====== -->
  <div class="search-bar">
    <div class="search-wrapper">
      <svg class="search-icon"><use href="#icon-search"/></svg>
      <input type="search" class="search-input" placeholder="Rechercher un plat…" aria-label="Rechercher un plat">
    </div>
  </div>

  <!-- ====== CATEGORY NAVIGATION (sticky pills) ====== -->
  <nav class="nav-pills" aria-label="Catégories du menu" id="nav-pills">
    <div class="nav-pills-inner" id="nav-pills-inner">
      <!-- Populated by JS on first render -->
    </div>
  </nav>

  <!-- ====== MENU CONTENT ====== -->
  <main id="menu-content" class="container" role="main">
    <p style="text-align:center;padding:3rem 1rem;color:#6B5B4F;">Chargement du menu…</p>
  </main>

  <!-- ====== FOOTER ====== -->
  <footer class="footer" role="contentinfo">
    <div class="footer-name">بلد الشام — Belad Al Cham</div>
    <p class="footer-address">Avenue Mohamed V, Tétouan</p>
    <div class="footer-filet"></div>
    <p class="footer-copy">&copy; 2025 Belad Al Cham. Tous droits réservés.</p>
  </footer>

  <!-- ====== BACK TO TOP ====== -->
  <button class="back-to-top" aria-label="Retour en haut">
    <svg><use href="#icon-chevron-up"/></svg>
  </button>

  <!-- ====== SCRIPTS ====== -->
  <script src="js/app.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/render.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
