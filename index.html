<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belad Al Cham — Menu | بلد الشام — قائمة الطعام</title>
  <meta name="description" content="Menu digital Belad Al Cham — Café & Restaurant, Avenue Mohamed V, Tétouan. Menu en français, arabe et espagnol.">
  <meta name="theme-color" content="#1A1512">

  <meta property="og:title" content="Belad Al Cham — Menu Digital">
  <meta property="og:description" content="Café & Restaurant — Avenue Mohamed V, Tétouan. Menu trilingue FR/AR/ES.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/images/Logo.png">

  <link rel="icon" href="assets/images/Logo.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ====== HEADER ====== -->
  <header class="header" role="banner">
    <img src="assets/images/Logo.png" alt="Belad Al Cham logo" class="header-logo" width="72" height="72">
    <div class="header-name-ar">بلد الشام</div>
    <div class="header-name-en">Belad Al Cham</div>
    <div class="header-tagline">Café &amp; Restaurant</div>
  </header>

  <!-- ====== LANGUAGE SELECTOR ====== -->
  <nav class="lang-selector" aria-label="Choix de langue">
    <button data-lang="fr" aria-pressed="true">FR</button>
    <button data-lang="ar" aria-pressed="false">AR</button>
    <button data-lang="es" aria-pressed="false">ES</button>
  </nav>

  <!-- ====== SEARCH ====== -->
  <div class="search-bar">
    <div class="search-wrapper">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="search" class="search-input" placeholder="Rechercher un plat…" aria-label="Rechercher un plat">
    </div>
  </div>

  <!-- ====== CATEGORY NAVIGATION (sticky pills) ====== -->
  <nav class="nav-pills" aria-label="Catégories du menu" id="nav-pills">
    <div class="nav-pills-inner" id="nav-pills-inner">
      <!-- Populated by JS on first render -->
    </div>
  </nav>

  <!-- ====== MENU CONTENT ====== -->
  <main id="menu-content" class="menu-content" role="main">
    <p style="text-align:center;padding:3rem 1rem;color:#6B5B4F;">Chargement du menu…</p>
  </main>

  <!-- ====== FOOTER ====== -->
  <footer class="footer" role="contentinfo">
    <div class="footer-name">بلد الشام — Belad Al Cham</div>
    <p class="footer-address">Avenue Mohamed V, Tétouan</p>
    <div class="footer-rule"></div>
    <p class="footer-copy">&copy; 2026 Belad Al Cham. Tous droits réservés.</p>
  </footer>

  <!-- ====== BACK TO TOP ====== -->
  <button class="back-to-top" aria-label="Retour en haut">
    <i class="fa-solid fa-chevron-up"></i>
  </button>

  <!-- ====== SCRIPTS ====== -->
  <script src="js/app.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/render.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
